name: Upstream Compatibility

on:
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:
    inputs:
      version:
        description: "toolregistry version to test against (e.g. 0.6.0)"
        required: false

jobs:
  test-against-upstream:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies with latest toolregistry
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server_core]"
          # Upgrade toolregistry to the version that triggered this, or latest
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          if [ -n "$VERSION" ]; then
            # Strip leading 'v' if present
            VERSION="${VERSION#v}"
            pip install "toolregistry==$VERSION"
          else
            pip install --upgrade toolregistry
          fi
          pip show toolregistry | grep Version

      - name: Run tests
        run: python -m pytest tests/ -v
