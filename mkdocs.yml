site_name: ToolRegistry Hub
site_description: 面向 LLM Agent 的即用工具集合 — 网络搜索、文件操作、代码执行等
site_author: Peng Ding
site_url: https://toolregistry-hub.readthedocs.io/zh-cn/latest
repo_name: Oaklight/toolregistry-hub
repo_url: https://github.com/Oaklight/toolregistry-hub
copyright: Copyright &copy; 2025 Peng Ding

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: 跟随系统偏好
    - media: "(prefers-color-scheme)"
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - header.autohide
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - content.footnote.tooltips

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        首页:
          - index.md
        快速上手:
          - get-started/installation.md
          - get-started/quickstart.md
        工具:
          - tools/index.md
          - tools/calculator.md
          - tools/unit_converter.md
          - tools/datetime.md
          - tools/file_ops.md
          - tools/file_reader.md
          - tools/file_search.md
          - tools/path_info.md
          - tools/websearch/web_fetch_tool.md
          - tools/websearch/index.md
          - tools/websearch/websearch_unified.md
          - tools/websearch/brave.md
          - tools/websearch/brightdata.md
          - tools/websearch/scrapeless.md
          - tools/websearch/serper.md
          - tools/websearch/tavily.md
          - tools/websearch/searxng.md
          - tools/bash_tool.md
          - tools/cron_tool.md
          - tools/think_tool.md
          - tools/todo_list.md
        指南:
          - guides/library.md
          - guides/server.md
          - guides/docker.md
        参考:
          - reference/cli.md
          - reference/endpoints.md
          - reference/environment.md
          - reference/helper_functions.md
          - tools/websearch/base_search.md
          - tools/websearch/search_result.md
        生态系统:
          - ecosystem.md
          - https://toolregistry.readthedocs.io/
          - https://toolregistry-server.readthedocs.io/
        更新日志:
          - changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/toolregistry-hub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/toolregistry-hub/
  alternate:
    - name: English
      link: /en/latest/
      lang: en
    - name: 中文
      link: /zh-cn/latest/
      lang: zh

extra_css:
  - stylesheets/toolregistry-hub.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 快速上手:
      - 安装: get-started/installation.md
      - 快速上手: get-started/quickstart.md
  - 指南:
      - 库使用方式: guides/library.md
      - 服务器模式: guides/server.md
      - Docker 部署: guides/docker.md
  - 工具:
      - tools/index.md
      - 计算与转换:
          - 计算器工具: tools/calculator.md
          - 单位转换: tools/unit_converter.md
      - 日期与时间:
          - 日期时间工具: tools/datetime.md
      - 文件管理:
          - 文件操作: tools/file_ops.md
          - 文件读取: tools/file_reader.md
          - 文件搜索: tools/file_search.md
          - 路径信息: tools/path_info.md
      - 网络工具:
          - 网页获取工具: tools/websearch/web_fetch_tool.md
          - 网络搜索工具:
              - 概述: tools/websearch/index.md
              - 统一网络搜索: tools/websearch/websearch_unified.md
              - Brave 搜索: tools/websearch/brave.md
              - BrightData 搜索: tools/websearch/brightdata.md
              - Scrapeless 搜索: tools/websearch/scrapeless.md
              - Serper 搜索: tools/websearch/serper.md
              - Tavily 搜索: tools/websearch/tavily.md
              - SearXNG 搜索: tools/websearch/searxng.md
      - Shell:
          - Bash 工具: tools/bash_tool.md
      - 定时任务:
          - 定时任务工具: tools/cron_tool.md
      - 其他工具:
          - 思考工具: tools/think_tool.md
          - 待办事项工具: tools/todo_list.md
  - 参考:
      - CLI: reference/cli.md
      - API 端点: reference/endpoints.md
      - 环境变量: reference/environment.md
      - 辅助函数: reference/helper_functions.md
      - 网络搜索基类: tools/websearch/base_search.md
      - 搜索结果类型: tools/websearch/search_result.md
      - 已弃用:
          - Bing 搜索: tools/websearch/bing.md
  - 生态系统:
      - 概述: ecosystem.md
      - ToolRegistry: https://toolregistry.readthedocs.io/
      - Server: https://toolregistry-server.readthedocs.io/
  - 更新日志: changelog.md
