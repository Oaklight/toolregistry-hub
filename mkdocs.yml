site_name: ToolRegistry Hub
site_description: 面向 LLM Agent 的即用工具集合 — 网络搜索、文件操作、代码执行等
site_author: Peng Ding
site_url: https://toolregistry-hub.readthedocs.io/zh-cn/
repo_name: Oaklight/toolregistry-hub
repo_url: https://github.com/Oaklight/toolregistry-hub
copyright: Copyright &copy; 2025 Peng Ding

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 跟随系统偏好
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/toolregistry-hub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/toolregistry-hub/
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh-cn/
      lang: zh

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 工具:
      - tools/index.md
      - 计算与转换:
          - 计算器工具: tools/calculator.md
          - 单位转换: tools/unit_converter.md
      - 日期与时间:
          - 日期时间工具: tools/datetime.md
      - 文件管理:
          - 文件操作: tools/file_ops.md
          - 文件读取: tools/file_reader.md
          - 文件搜索: tools/file_search.md
          - 路径信息: tools/path_info.md
          - 文件系统（已弃用）: tools/filesystem.md
      - 网络工具:
          - 网页获取工具: tools/websearch/web_fetch_tool.md
          - 网络搜索工具:
              - 概述: tools/websearch/index.md
              - Brave 搜索: tools/websearch/brave.md
              - BrightData 搜索: tools/websearch/brightdata.md
              - Scrapeless 搜索: tools/websearch/scrapeless.md
              - Serper 搜索: tools/websearch/serper.md
              - Tavily 搜索: tools/websearch/tavily.md
              - SearXNG 搜索: tools/websearch/searxng.md
      - Shell:
          - Bash 工具: tools/bash_tool.md
      - 其他工具:
          - 思考工具: tools/think_tool.md
          - 待办事项工具: tools/todo_list.md
  - 部署:
      - 库使用方式: library.md
      - 服务器模式: server.md
      - Docker 部署: docker.md
  - 开发:
      - 辅助函数: dev/helper_functions.md
      - 网络搜索基类: tools/websearch/base_search.md
      - 搜索结果类型: tools/websearch/search_result.md
      - 已弃用:
          - 旧版网络搜索: tools/websearch/legacy.md
          - Bing 搜索 (已弃用): tools/websearch/bing.md
  - 生态系统: ecosystem.md
  - 更新日志: changelog.md
  - ToolRegistry: https://toolregistry.readthedocs.io/
  - Server: https://toolregistry-server.readthedocs.io/
