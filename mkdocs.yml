site_name: ToolRegistry Hub
site_description: Ready-to-Use Tool Collection for LLM Agents — web search, file ops, code execution, and more
site_author: Peng Ding
site_url: https://toolregistry-hub.readthedocs.io/en/latest
repo_name: Oaklight/toolregistry-hub
repo_url: https://github.com/Oaklight/toolregistry-hub
copyright: Copyright &copy; 2025 Peng Ding

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
    - media: "(prefers-color-scheme)"
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - header.autohide
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - content.footnote.tooltips

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Home:
          - index.md
        Get Started:
          - get-started/installation.md
          - get-started/quickstart.md
        Tools:
          - tools/index.md
          - tools/calculator.md
          - tools/unit_converter.md
          - tools/datetime.md
          - tools/file_ops.md
          - tools/file_reader.md
          - tools/file_search.md
          - tools/path_info.md
          - tools/websearch/web_fetch_tool.md
          - tools/websearch/index.md
          - tools/websearch/websearch_unified.md
          - tools/websearch/brave.md
          - tools/websearch/brightdata.md
          - tools/websearch/scrapeless.md
          - tools/websearch/serper.md
          - tools/websearch/tavily.md
          - tools/websearch/searxng.md
          - tools/bash_tool.md
          - tools/cron_tool.md
          - tools/think_tool.md
          - tools/todo_list.md
        Guides:
          - guides/library.md
          - guides/server.md
          - guides/docker.md
        Reference:
          - reference/cli.md
          - reference/endpoints.md
          - reference/environment.md
          - reference/helper_functions.md
          - tools/websearch/base_search.md
          - tools/websearch/search_result.md
        Ecosystem:
          - ecosystem.md
          - https://toolregistry.readthedocs.io/
          - https://toolregistry-server.readthedocs.io/
        Changelog:
          - changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/toolregistry-hub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/toolregistry-hub/
  alternate:
    - name: English
      link: /en/latest/
      lang: en
    - name: 中文
      link: /zh-cn/latest/
      lang: zh

extra_css:
  - stylesheets/toolregistry-hub.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Get Started:
      - Installation: get-started/installation.md
      - Quick Start: get-started/quickstart.md
  - Tools:
      - tools/index.md
      - Calculation & Conversion:
          - Calculator Tools: tools/calculator.md
          - Unit Converter: tools/unit_converter.md
      - Date & Time:
          - Date Time Tools: tools/datetime.md
      - File Management:
          - File Operations: tools/file_ops.md
          - File Reader: tools/file_reader.md
          - File Search: tools/file_search.md
          - Path Info: tools/path_info.md
      - Web Tools:
          - Web Fetch Tool: tools/websearch/web_fetch_tool.md
          - Web Search Tools:
              - Overview: tools/websearch/index.md
              - Unified Web Search: tools/websearch/websearch_unified.md
              - Brave Search: tools/websearch/brave.md
              - BrightData Search: tools/websearch/brightdata.md
              - Scrapeless Search: tools/websearch/scrapeless.md
              - Serper Search: tools/websearch/serper.md
              - Tavily Search: tools/websearch/tavily.md
              - SearXNG Search: tools/websearch/searxng.md
      - Shell:
          - Bash Tool: tools/bash_tool.md
      - Scheduling:
          - Cron Tool: tools/cron_tool.md
      - Other Tools:
          - Think Tool: tools/think_tool.md
          - Todo List Tool: tools/todo_list.md
  - Guides:
      - Library Usage: guides/library.md
      - Server Mode: guides/server.md
      - Docker Deployment: guides/docker.md
  - Reference:
      - CLI: reference/cli.md
      - API Endpoints: reference/endpoints.md
      - Environment Variables: reference/environment.md
      - Helper Functions: reference/helper_functions.md
      - Web Search Base Class: tools/websearch/base_search.md
      - Search Result Types: tools/websearch/search_result.md
      - Deprecated:
          - Bing Search: tools/websearch/bing.md
  - Ecosystem:
      - Overview: ecosystem.md
      - ToolRegistry: https://toolregistry.readthedocs.io/
      - Server: https://toolregistry-server.readthedocs.io/
  - Changelog: changelog.md
