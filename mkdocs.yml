site_name: ToolRegistry Hub
site_description: A comprehensive Python library providing various utility tools
site_author: Peng Ding
site_url: https://toolregistry-hub.readthedocs.io/en/
repo_name: Oaklight/toolregistry-hub
repo_url: https://github.com/Oaklight/toolregistry-hub
copyright: Copyright &copy; 2025 Peng Ding

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/toolregistry-hub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/toolregistry-hub/
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh-cn/
      lang: zh

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Tools:
      - tools/index.md
      - Calculation & Conversion:
          - Calculator Tools: tools/calculator.md
          - Unit Converter: tools/unit_converter.md
      - Date & Time:
          - Date Time Tools: tools/datetime.md
      - File Management:
          - File Operations: tools/file_ops.md
          - File Reader: tools/file_reader.md
          - File Search: tools/file_search.md
          - Path Info: tools/path_info.md
          - File System (Deprecated): tools/filesystem.md
      - Web Tools:
          - Web Fetch Tool: tools/websearch/web_fetch_tool.md
          - Web Search Tools:
              - Overview: tools/websearch/index.md
              - Brave Search: tools/websearch/brave.md
              - BrightData Search: tools/websearch/brightdata.md
              - Scrapeless Search: tools/websearch/scrapeless.md
              - Serper Search: tools/websearch/serper.md
              - Tavily Search: tools/websearch/tavily.md
              - SearXNG Search: tools/websearch/searxng.md
      - Shell:
          - Bash Tool: tools/bash_tool.md
      - Other Tools:
          - Think Tool: tools/think_tool.md
          - Todo List Tool: tools/todo_list.md
  - Deployment:
      - Server Mode: server.md
      - Docker Deployment: docker.md
  - Development:
      - Helper Functions: dev/helper_functions.md
      - Web Search Base Class: tools/websearch/base_search.md
      - Search Result Types: tools/websearch/search_result.md
      - Deprecated:
          - Legacy Web Search: tools/websearch/legacy.md
          - Bing Search: tools/websearch/bing.md
  - Ecosystem: ecosystem.md
  - Changelog: changelog.md
  - ToolRegistry: https://toolregistry.readthedocs.io/
  - Server: https://toolregistry-server.readthedocs.io/
