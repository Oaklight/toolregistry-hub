services:
  gateway:
    image: caddy:2-alpine
    ports:
      - "${GATEWAY_PORT:-55090}:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - openapi
      - mcp-streamable-http
      - mcp-sse
    restart: unless-stopped

  openapi:
    image: oaklight/toolregistry-hub-server:${IMAGE_TAG:-latest}
    ports:
      - "55093:8000"
      # - "55193:8001"
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      # - ./tools.jsonc:/app/tools.jsonc:ro  # optional: override default tool list
    command:
      [
        "toolregistry-hub",
        "openapi",
        "--host=0.0.0.0",
        "--port=8000",
        "--profile=remote",
      ]
    restart: unless-stopped

  mcp-streamable-http:
    image: oaklight/toolregistry-hub-server:${IMAGE_TAG:-latest}
    ports:
      - "55094:8000"
      # - "55194:8001"
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      # - ./tools.jsonc:/app/tools.jsonc:ro  # optional: override default tool list
    command:
      [
        "toolregistry-hub",
        "mcp",
        "--transport=streamable-http",
        "--host=0.0.0.0",
        "--port=8000",
        "--profile=remote",
      ]
    restart: unless-stopped

  mcp-sse:
    image: oaklight/toolregistry-hub-server:${IMAGE_TAG:-latest}
    ports:
      - "55095:8000"
      # - "55195:8001"
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      # - ./tools.jsonc:/app/tools.jsonc:ro  # optional: override default tool list
    command:
      [
        "toolregistry-hub",
        "mcp",
        "--transport=sse",
        "--host=0.0.0.0",
        "--port=8000",
        "--profile=remote",
      ]
    restart: unless-stopped
